<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TIV-API Test Tool</title>
</head>
<body>
  <h1>TIV-API Test Tool</h1>

  <div>
    <label>Modo:</label>
    <select id="modeSelector">
      <option value="ascii">ASCII</option>
      <option value="ansi">ANSI</option>
      <option value="grey">GREY</option>
      <option value="256">256</option>
      <option value="rgb">RGB</option>
    </select>
  </div>

  <div id="optionsContainer"></div>

  <hr>

  <div>
    <h3>Por Archivo</h3>
    <input type="file" id="fileInput" accept=".png,.jpg,.jpeg">
    <button id="processBtn">Subir y Procesar</button>
    <div id="filePreviewContainer" style="margin-top: 10px; display: none;">
      <img id="filePreview" style="max-width: 400px; max-height: 400px; border: 1px solid #000;">
      <br>
      <a id="fileDownload" href="#" download>Descargar</a>
    </div>
    <div id="fileError" style="color: red; display: none;"></div>
  </div>

  <script type="module" src="/javascripts/main.js"></script>
</body>
</html>
